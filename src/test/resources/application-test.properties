spring.application.name=fake-store-auth-service-test
spring.datasource.driver-class-name=org.h2.Driver
jwt.private-key=dummy_test_private_key_must_be_long_enough_123456
jwt.public-key=dummy_test_public_key
jwt.expiration-minutes=60
app.cookie.refresh-expiration-seconds=3600
app.cookie.same-site=Lax
app.cookie-secure=false
app.cors.allowed-origins=dummy
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop